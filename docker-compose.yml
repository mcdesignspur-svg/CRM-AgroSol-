services:
  postgres:
    image: postgres:16-alpine
    container_name: agrosol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrosol
      POSTGRES_PASSWORD: agrosol
      POSTGRES_DB: agrosol_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrosol -d agrosol_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
