name: Production Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: production-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to Vercel Production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@54.18.7

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Load production environment variables
        run: |
          if [ -f .vercel/.env.production.local ]; then
            set -a
            # shellcheck disable=SC1091
            source .vercel/.env.production.local
            set +a
            echo "Loaded Vercel production env file."
          else
            echo "No .vercel/.env.production.local file found after vercel pull."
          fi
          if [ -z "${DATABASE_URL:-}" ] && [ -z "${DIRECT_DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL or DIRECT_DATABASE_URL is missing. Add at least one to Vercel Production environment variables and/or GitHub repository secrets, then re-run this workflow."
            exit 1
          fi
          if [ -z "${DATABASE_URL:-}" ] && [ -n "${DIRECT_DATABASE_URL:-}" ]; then
            export DATABASE_URL="${DIRECT_DATABASE_URL}"
            echo "DATABASE_URL unset; using DIRECT_DATABASE_URL for the build."
          else
            echo "DATABASE_URL is set."
          fi
          if [ -n "${DIRECT_DATABASE_URL:-}" ]; then
            echo "DIRECT_DATABASE_URL is set."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          url=$(vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Production deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
